<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Feedback Review - The Hale Dynasty</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="features.css">
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="analytics.js"></script>
  <style>
    :root {
      --gold: #c8a83c;
      --gold-soft: rgba(200,168,60,0.55);
      --gold-dim: rgba(200,168,60,0.24);
      --bg: #0c0a08;
      --bg-panel: #14100c;
      --bg-card: #17120d;
      --text: #d9c99a;
      --text-dim: #85704a;
      --line: rgba(200,168,60,0.14);
      --danger: #c07052;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at top, rgba(200,168,60,0.08), transparent 30%),
        linear-gradient(180deg, #0d0b08, #090806 40%, #0d0b08);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
      min-height: 100vh;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 14px 24px;
      background: rgba(8,6,4,0.9);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
      font-family: "Courier New", monospace;
      font-size: 0.72em;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .topbar a {
      color: var(--gold-soft);
      text-decoration: none;
    }

    .shell {
      max-width: 1100px;
      margin: 0 auto;
      padding: 42px 20px 60px;
    }

    .hero {
      margin-bottom: 24px;
      padding: 30px 28px;
      background: linear-gradient(180deg, rgba(200,168,60,0.05), rgba(200,168,60,0.02));
      border: 1px solid var(--line);
    }

    .eyebrow {
      font-family: "Courier New", monospace;
      font-size: 0.66em;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold-soft);
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 10px;
      font-family: "Cinzel", Georgia, serif;
      font-size: clamp(1.5rem, 4vw, 2.4rem);
      letter-spacing: 0.05em;
      color: var(--gold);
    }

    .lead {
      max-width: 65ch;
      margin: 0;
      color: var(--text-dim);
      font-size: 1rem;
      line-height: 1.75;
      font-style: italic;
    }

    .panel {
      background: var(--bg-panel);
      border: 1px solid var(--line);
      padding: 22px 20px;
      margin-bottom: 20px;
    }

    .auth-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 10px;
      align-items: center;
    }

    .field {
      width: 100%;
      background: #0e0b08;
      border: 1px solid var(--line);
      color: var(--text);
      padding: 12px 14px;
      font-size: 0.95rem;
      font-family: "Courier New", monospace;
    }

    .field:focus {
      outline: none;
      border-color: rgba(200,168,60,0.45);
    }

    .btn {
      border: 1px solid rgba(200,168,60,0.32);
      background: rgba(200,168,60,0.08);
      color: var(--text);
      padding: 12px 14px;
      cursor: pointer;
      font-family: "Courier New", monospace;
      font-size: 0.76em;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .btn:hover {
      border-color: rgba(200,168,60,0.58);
      color: #f1dea0;
    }

    .status {
      margin-top: 12px;
      min-height: 1.2em;
      font-family: "Courier New", monospace;
      font-size: 0.7em;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 14px;
      color: var(--text-dim);
      font-family: "Courier New", monospace;
      font-size: 0.72em;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .entries {
      display: grid;
      gap: 12px;
    }

    .entry {
      background: var(--bg-card);
      border: 1px solid var(--line);
      padding: 16px 16px 14px;
    }

    .entry-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 8px;
      font-family: "Courier New", monospace;
      font-size: 0.68em;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .clarity {
      color: var(--gold);
    }

    .entry-body {
      font-size: 0.98rem;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
    }

    .empty {
      border: 1px dashed var(--line);
      padding: 18px;
      color: var(--text-dim);
      font-style: italic;
    }

    .error {
      color: var(--danger);
    }

    @media (max-width: 720px) {
      .auth-row {
        grid-template-columns: 1fr;
      }
      .shell {
        padding-left: 14px;
        padding-right: 14px;
      }
      .hero,
      .panel {
        padding-left: 16px;
        padding-right: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="index.html">Return to Archive</a>
    <span>Private Feedback Desk</span>
  </div>

  <main class="shell">
    <section class="hero">
      <div class="eyebrow">MSS. Hale-Marsh Collection</div>
      <h1>Reader Feedback Review</h1>
      <p class="lead">A private desk for reviewing clarity notes from first-time readers. Public submission remains open. Reading requires your admin key.</p>
    </section>

    <section class="panel">
      <div class="auth-row">
        <input class="field" id="adminKey" type="password" placeholder="Enter FEEDBACK_ADMIN_KEY" autocomplete="current-password">
        <button class="btn" id="loadBtn">Load Feedback</button>
        <button class="btn" id="forgetBtn" type="button">Forget Key</button>
      </div>
      <div class="status" id="statusLine"></div>
    </section>

    <section class="panel">
      <div class="meta">
        <span id="entryCount">0 entries</span>
        <span>Newest first</span>
      </div>
      <div class="entries" id="entries">
        <div class="empty">No feedback loaded yet.</div>
      </div>
    </section>
  </main>

  <script>
    (function () {
      var STORAGE_KEY = 'hd_feedback_admin_key';
      var adminKeyInput = document.getElementById('adminKey');
      var loadBtn = document.getElementById('loadBtn');
      var forgetBtn = document.getElementById('forgetBtn');
      var statusLine = document.getElementById('statusLine');
      var entriesWrap = document.getElementById('entries');
      var entryCount = document.getElementById('entryCount');

      try {
        adminKeyInput.value = localStorage.getItem(STORAGE_KEY) || '';
      } catch (e) {}

      function setStatus(message, isError) {
        statusLine.textContent = message;
        statusLine.className = 'status' + (isError ? ' error' : '');
      }

      function escapeHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function formatDate(value) {
        if (!value) return 'Unknown date';
        var date = new Date(value);
        if (isNaN(date.getTime())) return value;
        return date.toLocaleString('en-GB', {
          year: 'numeric',
          month: 'short',
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        });
      }

      function renderEntries(entries) {
        entryCount.textContent = entries.length + (entries.length === 1 ? ' entry' : ' entries');

        if (!entries.length) {
          entriesWrap.innerHTML = '<div class="empty">No reader notes yet.</div>';
          return;
        }

        entriesWrap.innerHTML = entries.map(function (entry) {
          var note = entry.confusion && entry.confusion.trim()
            ? escapeHtml(entry.confusion)
            : '<em>No written note left.</em>';

          return [
            '<article class="entry">',
            '<div class="entry-top">',
            '<span class="clarity">' + escapeHtml(entry.clarity || 'unknown') + '</span>',
            '<span>' + escapeHtml(entry.path || 'unknown path') + '</span>',
            '<span>' + escapeHtml(formatDate(entry.date)) + '</span>',
            '</div>',
            '<div class="entry-body">' + note + '</div>',
            '</article>'
          ].join('');
        }).join('');
      }

      function loadEntries() {
        var key = adminKeyInput.value.trim();
        if (!key) {
          setStatus('Enter your admin key first.', true);
          return;
        }

        setStatus('Loading feedback...', false);
        loadBtn.disabled = true;

        fetch('/api/feedback', {
          method: 'GET',
          headers: {
            'X-Feedback-Key': key
          }
        }).then(function (res) {
          if (res.status === 403) {
            throw new Error('That key was not accepted.');
          }
          if (res.status === 503) {
            throw new Error('Set FEEDBACK_ADMIN_KEY in Vercel before reading feedback.');
          }
          if (!res.ok) {
            throw new Error('Could not load feedback right now.');
          }
          return res.json();
        }).then(function (data) {
          try {
            localStorage.setItem(STORAGE_KEY, key);
          } catch (e) {}
          renderEntries(Array.isArray(data.entries) ? data.entries : []);
          setStatus('Feedback loaded.', false);
          if (typeof window.hdTrack === 'function') {
            window.hdTrack('feedback_review_loaded', {
              count: Array.isArray(data.entries) ? data.entries.length : 0
            });
          }
        }).catch(function (err) {
          setStatus(err.message, true);
        }).finally(function () {
          loadBtn.disabled = false;
        });
      }

      loadBtn.addEventListener('click', loadEntries);

      adminKeyInput.addEventListener('keydown', function (event) {
        if (event.key === 'Enter') loadEntries();
      });

      forgetBtn.addEventListener('click', function () {
        adminKeyInput.value = '';
        try {
          localStorage.removeItem(STORAGE_KEY);
        } catch (e) {}
        entriesWrap.innerHTML = '<div class="empty">No feedback loaded yet.</div>';
        entryCount.textContent = '0 entries';
        setStatus('Stored key cleared from this browser.', false);
      });
    })();
  </script>
</body>
</html>
