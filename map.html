<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>The Hale Lands · Map · The Hale Dynasty Archive</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --paper: #efe3c8;
      --paper-deep: #d8c29a;
      --ink: #2c2219;
      --ink-soft: #65543e;
      --oxblood: #7d3327;
      --brass: #b38a34;
      --blue: #4f667d;
      --frame: rgba(94, 66, 38, 0.22);
    }
    html, body { height:100%; background:#f2ead7; }
    body { font-family:'IM Fell English',Georgia,serif; color:var(--ink); overflow:hidden; }

    /* ── FULL-SCREEN MAP ── */
    #map {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    /* Age + warm the tiles to look like an archive map */
    .leaflet-tile-pane {
      filter: sepia(38%) saturate(0.6) brightness(0.78) hue-rotate(-2deg);
    }

    /* Remove Leaflet's default attribution styling conflicts */
    .leaflet-control-attribution {
      background: rgba(245,236,221,0.82) !important;
      color: rgba(94,66,38,0.45) !important;
      font-family: 'Courier New', monospace !important;
      font-size: 0.52em !important;
      letter-spacing: 0.05em !important;
      border: none !important;
    }
    .leaflet-control-attribution a { color: rgba(94,66,38,0.62) !important; }
    .leaflet-control-zoom {
      border: 1px solid rgba(94,66,38,0.22) !important;
      background: transparent !important;
    }
    .leaflet-control-zoom a {
      background: rgba(245,236,221,0.92) !important;
      color: rgba(94,66,38,0.7) !important;
      border-bottom: 1px solid rgba(94,66,38,0.12) !important;
      font-family: 'Cinzel', serif !important;
      font-size: 14px !important;
      width: 32px !important; height: 32px !important;
      line-height: 32px !important;
      transition: color 0.2s, background 0.2s !important;
    }
    .leaflet-control-zoom a:hover {
      background: rgba(123,52,40,0.06) !important;
      color: var(--oxblood) !important;
    }
    .leaflet-control-zoom-out { border-bottom: none !important; }

    /* ── TOP OVERLAY BAR ── */
    .map-topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      background: linear-gradient(to bottom, rgba(245,236,221,0.92) 62%, transparent 100%);
      padding: 0;
      pointer-events: none;
    }
    .map-topbar > * { pointer-events: all; }

    .map-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 24px;
      border-bottom: 1px solid rgba(94,66,38,0.14);
      background: rgba(245,236,221,0.78);
      backdrop-filter: blur(6px);
    }
    .map-nav a {
      font-family: 'Cinzel', serif;
      font-size: 0.65em;
      letter-spacing: 0.16em;
      color: rgba(94,66,38,0.66);
      text-decoration: none;
      transition: color 0.2s;
    }
    .map-nav a:hover { color: var(--oxblood); }
    .map-nav-title {
      font-family: 'Cinzel', serif;
      font-size: 0.75em;
      font-weight: 600;
      letter-spacing: 0.25em;
      color: #3d2d1c;
      text-transform: uppercase;
    }

    /* ── ERA STRIP ── */
    .era-strip-wrap {
      padding: 8px 16px 0;
      background: rgba(241,231,211,0.72);
      backdrop-filter: blur(4px);
    }
    .era-strip {
      display: flex;
      gap: 5px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 8px;
    }
    .era-strip::-webkit-scrollbar { display: none; }
    .era-btn {
      flex-shrink: 0;
      padding: 4px 10px;
      border: 1px solid rgba(94,66,38,0.2);
      background: rgba(255,255,255,0.28);
      color: rgba(94,66,38,0.6);
      font-family: 'Cinzel', serif;
      font-size: 0.55em;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.22s;
      text-transform: uppercase;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .era-btn:hover { border-color:rgba(123,52,40,0.42); color:var(--oxblood); }
    .era-btn.active { background:rgba(123,52,40,0.08); border-color:rgba(123,52,40,0.42); color:var(--oxblood); }
    .era-desc-bar {
      padding: 5px 16px 8px;
      font-size: 0.63em;
      font-style: italic;
      color: rgba(94,66,38,0.62);
      min-height: 26px;
      background: rgba(241,231,211,0.64);
    }

    /* ── CUSTOM LEAFLET MARKERS ── */
    .hd-marker {
      cursor: pointer;
      position: relative;
    }
    .hd-marker-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.15s;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.7));
    }
    .hd-marker:hover .hd-marker-inner { transform: scale(1.15) translateY(-2px); }
    .hd-marker-inner svg { display: block; }
    .hd-marker-label {
      position: absolute;
      bottom: calc(100% + 4px);
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: #241a11;
      background: rgba(244,233,212,0.97);
      border: 1px solid rgba(94,66,38,0.38);
      padding: 2px 7px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      z-index: 20;
    }
    .hd-marker:hover .hd-marker-label { opacity: 1; }

    /* Halecroft pulsing ring */
    .hd-pulse {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(200,168,60,0.4);
      animation: hdPulse 2.4s ease-out infinite;
      pointer-events: none;
    }
    @keyframes hdPulse {
      0%   { width:16px; height:16px; margin:-8px 0 0 -8px; opacity:0.7; }
      100% { width:50px; height:50px; margin:-25px 0 0 -25px; opacity:0; }
    }

    /* Easter egg markers — faint glinting dots on the water */
    .hd-ee-marker {
      cursor: pointer;
      width: 20px; height: 20px;
      display: flex; align-items: center; justify-content: center;
    }
    .hd-ee-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(123,52,40,0.22);
      box-shadow: 0 0 7px 2px rgba(200,168,60,0.14);
      animation: eeGlint 3.5s ease-in-out infinite;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .hd-ee-marker:hover .hd-ee-dot {
      background: rgba(123,52,40,0.58);
      box-shadow: 0 0 14px 5px rgba(200,168,60,0.45);
    }
    @keyframes eeGlint {
      0%, 100% { opacity: 0.35; transform: scale(1); }
      50%       { opacity: 0.85; transform: scale(1.3); }
    }

    /* ── DETAIL PANEL (right side, desktop) ── */
    .detail-panel {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 320px;
      z-index: 20;
      transform: translateX(100%);
      transition: transform 0.38s cubic-bezier(0.22,1,0.36,1);
      pointer-events: none;
    }
    .detail-panel.open {
      transform: translateX(0);
      pointer-events: all;
    }
    .detail-inner {
      position: absolute;
      inset: 0;
      background: rgba(10,7,4,0.97);
      border-left: 1px solid rgba(200,168,60,0.2);
      overflow-y: auto;
      padding: 56px 22px 30px;
      backdrop-filter: blur(8px);
    }
    .detail-inner::before {
      content: '';
      position: absolute;
      inset: 4px;
      border: 1px solid rgba(200,168,60,0.07);
      pointer-events: none;
    }
    .close-panel {
      position: absolute; top: 14px; right: 16px;
      background: none; border: none;
      color: rgba(200,168,60,0.35); font-size: 1.3em; cursor: pointer;
      font-family: 'Courier New', monospace; transition: color 0.2s; z-index: 10;
      -webkit-tap-highlight-color: transparent;
    }
    .close-panel:hover { color: #C8A83C; }
    .detail-era-badge {
      display: inline-block;
      font-family: 'Cinzel', serif; font-size: 0.5em; letter-spacing: 0.15em;
      color: rgba(200,168,60,0.55); border: 1px solid rgba(200,168,60,0.2);
      padding: 2px 8px; margin-bottom: 8px;
    }
    .detail-name {
      font-family: 'Cinzel', serif; font-size: 1.0em; font-weight: 600;
      color: rgba(200,168,60,0.9); padding-right: 20px; margin-bottom: 8px; line-height: 1.3;
    }
    .detail-divider {
      width: 40px; height: 1px;
      background: linear-gradient(to right, rgba(200,168,60,0.5), transparent);
      margin: 0 0 12px;
    }
    .detail-desc {
      font-size: 0.76em; line-height: 1.85; color: rgba(210,195,158,0.78); font-style: italic;
      white-space: pre-line;
    }
    .detail-link {
      display: inline-block; margin-top: 14px;
      font-family: 'Cinzel', serif; font-size: 0.58em; letter-spacing: 0.14em;
      color: rgba(200,168,60,0.55); text-decoration: none;
      border-bottom: 1px solid rgba(200,168,60,0.2); padding-bottom: 1px;
      transition: color 0.2s, border-color 0.2s;
    }
    .detail-link:hover { color: rgba(200,168,60,0.9); border-color: rgba(200,168,60,0.6); }
    .detail-persons { margin-top: 14px; padding-top: 12px; border-top: 1px solid rgba(200,168,60,0.1); }
    .detail-persons-label {
      font-family: 'Courier New', monospace; font-size: 0.5em; letter-spacing: 0.2em;
      text-transform: uppercase; color: rgba(200,168,60,0.35); margin-bottom: 7px;
    }
    .detail-person-link {
      display: inline-block;
      font-family: 'Cinzel', serif; font-size: 0.56em; letter-spacing: 0.09em;
      color: rgba(200,168,60,0.55); text-decoration: none;
      border: 1px solid rgba(200,168,60,0.18); padding: 3px 9px; margin: 0 4px 4px 0;
      transition: all 0.2s; background: rgba(200,168,60,0.04);
    }
    .detail-person-link:hover {
      color: rgba(200,168,60,0.9); border-color: rgba(200,168,60,0.5);
      background: rgba(200,168,60,0.09);
    }

    /* ── EASTER EGG CARD ── */
    .ee-card {
      display: none; position: fixed; z-index: 500;
      background: radial-gradient(ellipse, #1E1408 0%, #120E08 100%);
      border: 1px solid rgba(200,168,60,0.28);
      padding: 20px 22px;
      max-width: 300px; min-width: 220px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.8);
      animation: eeIn 0.25s ease;
    }
    @keyframes eeIn { from { opacity:0; transform:translateY(6px); } }
    .ee-close {
      position: absolute; top: 8px; right: 10px;
      background: none; border: none; color: rgba(200,168,60,0.4);
      font-size: 1.1em; cursor: pointer; padding: 4px 6px;
      -webkit-tap-highlight-color: transparent;
    }
    .ee-close:hover { color: #C8A83C; }
    .ee-seal { display: block; font-size: 1.4em; margin-bottom: 6px; }
    .ee-title {
      font-family: 'Cinzel', serif; font-size: 0.72em; letter-spacing: 0.1em;
      color: rgba(200,168,60,0.85); margin-bottom: 10px; line-height: 1.35; padding-right: 16px;
    }
    .ee-body {
      font-size: 0.72em; line-height: 1.8; color: rgba(200,185,148,0.7);
      font-style: italic; white-space: pre-line;
    }


    /* ── MOBILE (≤ 700px) ── */
    @media (max-width: 700px) {
      .map-nav-title { display: none; }
      .map-nav { padding: 8px 14px; }
      .map-nav a { font-size: 0.6em; }

      /* Detail panel becomes bottom sheet */
      .detail-panel {
        top: auto;
        right: 0; left: 0; bottom: 0;
        width: 100%;
        transform: translateY(110%);
        transition: transform 0.38s cubic-bezier(0.22,1,0.36,1);
        max-height: 72vh;
      }
      .detail-panel.open { transform: translateY(0); }
      .detail-inner {
        position: relative;
        border-left: none;
        border-top: 1px solid rgba(200,168,60,0.22);
        border-radius: 16px 16px 0 0;
        max-height: 72vh;
        padding: 24px 20px max(24px, env(safe-area-inset-bottom));
      }
      /* Drag handle */
      .detail-inner::after {
        content: '';
        display: block;
        position: absolute;
        top: 10px; left: 50%;
        transform: translateX(-50%);
        width: 36px; height: 4px;
        background: rgba(200,168,60,0.2);
        border-radius: 2px;
      }
      /* Hover labels don't work on touch — hide them */
      .hd-marker-label { display: none !important; }
    }
  </style>
  <link rel="stylesheet" href="features.css">
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="analytics.js"></script>
</head>

  v:    '1714–1811 · Sir Nathaniel builds a London fortune. The Hales become merchant princes.',
  vi:   '1811–1820 · Elegance and danger. The Hales move in circles of power and scandal.',
  vii:  '1837–1901 · Edmund dies at Whitmore Park. His illegitimate son begins a new chapter.',
  viii: '1914–1918 · The Hales serve in the trenches. Halecroft becomes a hospital.',
  ix:   '1939–1950 · Brixton is bombed. Edmund designs Harlow. The family disperses, then gathers.',
  x:    '1950–2026 · James Marsh-Hale becomes chronicler of the dynasty. The saga nears its end.'
};

var EE_DATA = {
  compass:    { seal:'🔏', title:'The Hale Motto', body:'Malis Temporibus, Sedemus Firmi — In Evil Times, We Stand Fast.\n\nCarved into the lintel at Halecroft in 1121 by Brother Eadmer of Worcester. It remains there still. There are marks in the stone below it where, in 1642, someone took a chisel to it and thought better of it halfway through.' },
  'ship-west':{ seal:'⛵', title:'Cargo Manifest — Stella Maris, October 1066', body:'Three destriers of Norman breed.\nOne chest sealed with the de la Hale sigil — contents unknown.\nOne sword of Norman steel, blessed at Fécamp Abbey.\nOne man who would not return.\n\nDestination: England.' },
  cartouche:  { seal:'📜', title:'Regni Angliae & Principatus Walliae Descriptio', body:'Per Hondium Hondio, MDLXCVII.\n\nThis cartographic record was commissioned by Sir Nathaniel Hale in 1698, shortly after his arrival in London. He wished, he said, \'to see the whole of it at once — the land that made us.\'\n\nThe original hangs in the study at Halecroft. The room is kept locked.' },
  'ship-east':{ seal:'⚠', title:'A Vessel Lost — Winter 1348', body:'A Hale ship was lost off the Norfolk coast in the first winter of the plague. Thomas Hale\'s younger brother was aboard, returning from the continent with medicines purchased at great cost.\n\nNo survivors. No cargo recovered. One line in the parish record of Blakeney, dated February 1349.\n\n— Hale-Marsh Papers, Vol. II, marginal note' },
  scotland:   { seal:'🪶', title:'The Hale-Mackay Accord, February 1320', body:'An alliance struck in secret during the Scottish Wars of Independence. A Hale daughter given in marriage north of the border. The terms were never written down — by agreement of both parties.\n\nIt is not recorded in any English chronicle.\nIt is not recorded in any Scottish one either.\n\nSomething was exchanged. No one living knows what.' },
  channel:    { seal:'⚓', title:'The Crossing — 14th October, 1066', body:'Ranulf de la Hale crossed here with William the Conqueror\'s fleet. He was twenty-three years old. He carried nothing except a sword and a letter of introduction from the Bishop of Bayeux.\n\nHe would never return to Normandy.\n\nFrom this crossing, nine centuries follow.' }
};

/* Easter egg locations */
var EE_PINS = {
  compass:    { latlng:[51.49, 0.00],   data:'compass'    },
  'ship-west':{ latlng:[50.00,-4.50],   data:'ship-west'  },
  cartouche:  { latlng:[56.50,-7.50],   data:'cartouche'  },
  'ship-east':{ latlng:[53.00, 2.80],   data:'ship-east'  },
  scotland:   { latlng:[57.20,-3.80],   data:'scotland'   },
  channel:    { latlng:[50.10,-1.50],   data:'channel'    }
};

/* ══════════════════════════════════════════════
   INITIALISE MAP
══════════════════════════════════════════════ */

var map = L.map('map', {
  center: [53.0, -2.5],
  zoom: 6,
  minZoom: 5,
  maxZoom: 13,
  zoomControl: true,
  attributionControl: true
});

// CartoDB Dark Matter (no labels) — aged with CSS filter
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> · <a href="https://carto.com">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 20
}).addTo(map);

// Move zoom control to bottom-right (away from nav bar)
map.zoomControl.setPosition('bottomright');

/* ══════════════════════════════════════════════
   MARKER HELPERS
══════════════════════════════════════════════ */

function pinColor(type) {
  var colors = {
    seat:  '#E8C84C',
    main:  '#C8A83C',
    plague:'#8B1A1A',
    war:   '#3A5480',
    ghost: 'rgba(200,168,60,0.28)'
  };
  return colors[type] || '#C8A83C';
}

function makeMarkerIcon(key, pin) {
  var isHalecroft = key === 'halecroft';
  var isGhost     = pin.type === 'ghost';
  var isWar       = pin.type === 'war';
  var isPlagueType = pin.type === 'plague';
  var col = pinColor(pin.type);

  var pulseHtml = isHalecroft
    ? '<div class="hd-pulse"></div><div class="hd-pulse" style="animation-delay:0.8s"></div>'
    : '';

  var svgSize = isHalecroft ? 38 : 24;
  var pinSvg;

  if (isHalecroft) {
    pinSvg = '<svg width="38" height="38" viewBox="-19 -19 38 38">' +
      '<circle r="16" fill="none" stroke="rgba(200,168,60,0.3)" stroke-width="0.8"/>' +
      '<polygon points="0,-12 2.8,-3.8 11,-3.8 4.5,1.5 7,9.5 0,5.2 -7,9.5 -4.5,1.5 -11,-3.8 -2.8,-3.8"' +
      ' fill="' + col + '" stroke="rgba(140,100,20,0.8)" stroke-width="0.7"/>' +
      '</svg>';
  } else if (isGhost) {
    pinSvg = '<svg width="18" height="25" viewBox="-9 -12 18 26">' +
      '<path d="M0,12 C-1,8 -8,4 -8,-2 A8,8,0,1,1,8,-2 C8,4 1,8 0,12 Z"' +
      ' fill="rgba(200,168,60,0.15)" stroke="rgba(200,168,60,0.3)" stroke-width="0.8" stroke-dasharray="3,2"/>' +
      '<text x="0" y="0" text-anchor="middle" dominant-baseline="middle" fill="rgba(200,168,60,0.4)" font-size="7" font-family="serif">?</text>' +
      '</svg>';
  } else {
    pinSvg = '<svg width="20" height="28" viewBox="-10 -12 20 28">' +
      '<path d="M0,14 C-1,9 -9,5 -9,-2 A9,9,0,1,1,9,-2 C9,5 1,9 0,14 Z" fill="' + col + '" stroke="rgba(255,220,100,0.4)" stroke-width="0.7"/>' +
      '<circle cx="0" cy="-2" r="3.5" fill="rgba(255,240,160,0.5)"/>' +
      '</svg>';
  }

  var html = '<div class="hd-marker' + (isGhost ? ' hd-ghost' : '') + '" style="width:' + svgSize + 'px;height:' + (isHalecroft ? 38 : 28) + 'px;position:relative;">' +
    pulseHtml +
    '<div class="hd-marker-inner">' + pinSvg + '</div>' +
    '<span class="hd-marker-label">' + pin.name + '</span>' +
    '</div>';

  return L.divIcon({
    html: html,
    className: '',
    iconSize:   isHalecroft ? [38, 38] : [20, 28],
    iconAnchor: isHalecroft ? [19, 19] : [10, 28],
    popupAnchor:[0, -28]
  });
}

/* ══════════════════════════════════════════════
   CREATE MARKERS
══════════════════════════════════════════════ */

var markers = {};

Object.keys(PINS).forEach(function(key) {
  var pin = PINS[key];
  var m = L.marker(pin.latlng, {
    icon: makeMarkerIcon(key, pin),
    title: pin.name
  }).addTo(map);

  m.on('click', function(e) {
    L.DomEvent.stopPropagation(e);
    openPanel(key);
  });

  markers[key] = { marker: m, pin: pin };
});

/* Easter egg markers */
Object.keys(EE_PINS).forEach(function(key) {
  var ep = EE_PINS[key];
  var icon = L.divIcon({
    html: '<div class="hd-ee-marker"><div class="hd-ee-dot"></div></div>',
    className: '',
    iconSize: [20, 20],
    iconAnchor: [10, 10]
  });
  var em = L.marker(ep.latlng, { icon: icon }).addTo(map);
  em.on('click', function(e) {
    L.DomEvent.stopPropagation(e);
    showEE(ep.data, e.originalEvent);
  });
});

/* ══════════════════════════════════════════════
   PANEL
══════════════════════════════════════════════ */

var panel = document.getElementById('detailPanel');

function openPanel(key) {
  var loc = PINS[key]; if (!loc) return;

  // Update URL hash for shareable deep-link
  if (history.replaceState) history.replaceState(null, '', '#' + key);

  // Fly the map to this location — minimum zoom 9, keep higher if already zoomed in
  var targetZoom = Math.max(map.getZoom(), 9);
  map.flyTo(loc.latlng, targetZoom, { animate: true, duration: 1.1, easeLinearity: 0.25 });

  document.getElementById('detailBadge').textContent = loc.badge || '';
  document.getElementById('detailName').textContent  = loc.name;

  document.getElementById('detailDesc').textContent = loc.desc;

  var lk = document.getElementById('detailLink');
  if (loc.link) { lk.href=loc.link; lk.textContent=(loc.linkText||'Open era record')+' →'; lk.style.display=''; }
  else lk.style.display='none';

  var ps = document.getElementById('detailPersons');
  var pc = document.getElementById('detailPersonLinks'); pc.innerHTML = '';
  if (loc.persons && loc.persons.length) {
    loc.persons.forEach(function(p) {
      var a = document.createElement('a');
      a.className='detail-person-link'; a.href='persons.html#'+p.id; a.textContent=p.name;
      pc.appendChild(a);
    });
    ps.style.display='';
  } else {
    ps.style.display='none';
  }

  panel.classList.add('open');
}

function closePanel() {
  panel.classList.remove('open');
  if (history.replaceState) history.replaceState(null, '', window.location.pathname);
}

document.getElementById('closeBtn').addEventListener('click', closePanel);
map.on('click', closePanel);

// Open pin from URL hash on page load
(function() {
  var hash = window.location.hash.replace('#', '');
  if (hash && PINS[hash]) {
    setTimeout(function() { openPanel(hash); }, 800);
  }
})();

/* ══════════════════════════════════════════════
   ERA FILTERS
══════════════════════════════════════════════ */

var currentEra = 'all';

function filterMarkers() {
  Object.keys(markers).forEach(function(key) {
    var m = markers[key];
    var eras = m.pin.eras;
    var show = currentEra === 'all' || eras.indexOf(currentEra) !== -1 || eras.indexOf('all') !== -1;
    var el = m.marker.getElement();
    if (el) el.style.opacity = show ? '1' : '0.08';
    if (el) el.style.pointerEvents = show ? '' : 'none';
  });
}

document.getElementById('eraStrip').addEventListener('click', function(e) {
  var btn = e.target.closest('.era-btn'); if (!btn) return;
  document.querySelectorAll('.era-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  currentEra = btn.dataset.era;
  document.getElementById('eraDesc').textContent = ERA_DESCS[currentEra] || '';
  filterMarkers();
  closePanel();

  // Fly to fit the pins for this era
  if (currentEra === 'all') {
    map.flyTo([53.0, -2.5], 6, { animate: true, duration: 1.2 });
  } else {
    var pts = [];
    Object.keys(PINS).forEach(function(k) {
      var p = PINS[k];
      if (p.eras.indexOf(currentEra) !== -1) pts.push(L.latLng(p.latlng));
    });
    // Always anchor to Halecroft
    pts.push(L.latLng(PINS.halecroft.latlng));
    if (pts.length > 1) {
      map.flyToBounds(L.latLngBounds(pts), { padding: [90, 90], maxZoom: 10, animate: true, duration: 1.3 });
    }
  }
});

/* ══════════════════════════════════════════════
   EASTER EGGS
══════════════════════════════════════════════ */

var eeCard = document.getElementById('eeCard');

function showEE(key, evt) {
  var data = EE_DATA[key]; if (!data) return;
  document.getElementById('eeSeal').textContent = data.seal||'';
  document.getElementById('eeTitle').textContent = data.title;
  document.getElementById('eeBody').textContent  = data.body;

  eeCard.style.display = 'block';
  var x = evt ? evt.clientX : window.innerWidth/2;
  var y = evt ? evt.clientY : window.innerHeight/2;
  var cw = 300, ch = 200;
  var left = Math.min(x+14, window.innerWidth-cw-14);
  var top  = Math.min(y-20, window.innerHeight-ch-14);
  if (top < 8) top = 8;
  eeCard.style.left = left+'px'; eeCard.style.top = top+'px';
}

document.getElementById('eeClose').addEventListener('click', function(){ eeCard.style.display='none'; });
map.on('click', function(){ eeCard.style.display='none'; });

})();
</script>

<script src="transitions.js"></script>
<script src="features.js"></script>
<script src="inquiry.js"></script>
